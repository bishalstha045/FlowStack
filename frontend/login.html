<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FlowStack — Sign in to your personal analytics dashboard.">
    <title>Sign In — FlowStack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="auth-body">

<div class="auth-wrap">
    <div class="auth-logo">
        <div class="wordmark">⚡ FlowStack</div>
        <p>Personal analytics — understand yourself first.</p>
    </div>
    <div class="auth-card">
        <h1>Welcome back</h1>
        <div id="error-msg" class="alert alert-danger" style="display:none" role="alert"></div>
        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" id="btn-login" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem">
                Sign In
            </button>
        </form>
    </div>
    <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one →</a>
    </div>
</div>

<script src="assets/js/app.js"></script>
<script>
(async function () {
    // If already logged in, redirect to dashboard
    try {
        const res = await fetch(FS.BACKEND + '/auth/check.php', { credentials: 'same-origin' });
        const d   = await res.json().catch(() => ({}));
        if (d.authenticated) { window.location.href = 'dashboard.html'; return; }
    } catch (_) {}

    const form   = document.getElementById('login-form');
    const errEl  = document.getElementById('error-msg');
    const btn    = document.getElementById('btn-login');

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errEl.style.display = 'none';
        btn.disabled = true; btn.textContent = 'Signing in…';

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        const res = await FS.api('/auth/login.php', 'POST', { email, password });
        if (res.ok) {
            window.location.href = 'dashboard.html';
        } else {
            errEl.textContent    = res.data.error || 'Login failed. Please try again.';
            errEl.style.display  = 'block';
            btn.disabled = false; btn.textContent = 'Sign In';
        }
    });
})();
</script>
</body>
</html>
