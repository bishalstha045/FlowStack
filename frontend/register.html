<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FlowStack — Create your free account.">
    <title>Register — FlowStack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="auth-body">

<div class="auth-wrap">
    <div class="auth-logo">
        <div class="wordmark">⚡ FlowStack</div>
        <p>Start tracking your habits, focus & decisions.</p>
    </div>
    <div class="auth-card">
        <h1>Create account</h1>
        <div id="error-msg"   class="alert alert-danger"  style="display:none" role="alert"></div>
        <div id="success-msg" class="alert alert-success" style="display:none" role="status"></div>
        <form id="register-form" novalidate>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="Alex Johnson" autocomplete="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="8+ characters" autocomplete="new-password" required>
                <p class="form-hint">Minimum 8 characters</p>
            </div>
            <div class="form-group">
                <label for="password-confirm">Confirm Password</label>
                <input type="password" id="password-confirm" class="form-control" placeholder="Repeat password" autocomplete="new-password" required>
            </div>
            <button type="submit" id="btn-register" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem">
                Create Account
            </button>
        </form>
    </div>
    <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in →</a>
    </div>
</div>

<script src="assets/js/app.js"></script>
<script>
(async function () {
    const form    = document.getElementById('register-form');
    const errEl   = document.getElementById('error-msg');
    const succEl  = document.getElementById('success-msg');
    const btn     = document.getElementById('btn-register');

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errEl.style.display  = 'none';
        succEl.style.display = 'none';
        btn.disabled = true; btn.textContent = 'Creating account…';

        const name             = document.getElementById('name').value.trim();
        const email            = document.getElementById('email').value.trim();
        const password         = document.getElementById('password').value;
        const password_confirm = document.getElementById('password-confirm').value;

        const res = await FS.api('/auth/register.php', 'POST', { name, email, password, password_confirm });
        if (res.ok) {
            succEl.textContent   = res.data.message || 'Account created! Redirecting…';
            succEl.style.display = 'block';
            form.reset();
            setTimeout(() => window.location.href = 'login.html', 1800);
        } else {
            errEl.textContent   = res.data.error || 'Registration failed.';
            errEl.style.display = 'block';
        }
        btn.disabled = false; btn.textContent = 'Create Account';
    });
})();
</script>
</body>
</html>
