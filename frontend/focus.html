<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Focus Tracker Measure deep work and get productivity insights.">
  <title>Focus Tracker FlowStack</title>
  <link rel="stylesheet" href="assets/css/app.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="fs-loading"><div class="fs-spinner"></div><span class="loading-text">Loading focus data…</span></div>

<div class="fs-app" id="fs-app" style="display:none">
  <div id="fs-overlay" class="sidebar-overlay"></div>
  <aside id="fs-sidebar" class="sidebar"></aside>
  <div class="fs-body">
    <header id="fs-header" class="header"></header>
    <main class="main-content">

      <div class="page-header">
        <div class="page-header-text">
          <h1>Focus Tracker</h1>
          <p>Track deep work sessions and get intelligent productivity analysis</p>
        </div>
      </div>

      <!-- Productivity score + metrics -->
      <div class="prod-score-card" id="prod-card" style="display:none">
        <div id="focus-gauge"></div>
        <div class="prod-score-right">
          <div class="prod-score-title">PRODUCTIVITY SCORE</div>
          <div class="prod-score-val" id="ps-val"></div>
          <div class="prod-score-sub" id="ps-sub"></div>
          <div class="prod-metric-row">
            <div class="prod-metric">
              <div class="val" id="pm-avg"></div>
              <div class="lbl">Avg Session</div>
            </div>
            <div class="prod-metric">
              <div class="val" id="pm-deep"></div>
              <div class="lbl">Deep Work</div>
            </div>
            <div class="prod-metric">
              <div class="val" id="pm-week"></div>
              <div class="lbl">Week Hours</div>
            </div>
            <div class="prod-metric">
              <div class="val" id="pm-trend"></div>
              <div class="lbl">Trend</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Intelligence insights -->
      <div class="intel-panel" id="focus-intel-panel" style="display:none">
        <div class="intel-header">
          <h2><i data-lucide="brain" style="width:18px;height:18px;display:inline-block;vertical-align:middle;"></i> Focus Intelligence</h2>
          <span class="intel-badge" id="focus-badge"></span>
        </div>
        <div id="focus-insights"></div>
      </div>

      <!-- Timer -->
      <div class="card timer-card">
        <div class="timer-display" id="timer-display">00:00</div>
        <div class="timer-progress"><div class="timer-progress-bar" id="timer-bar"></div></div>
        <div class="timer-status" id="timer-status">Ready start a deep work session</div>
        <div class="timer-actions" id="timer-actions">
          <button class="btn btn-primary btn-lg" onclick="startTimer()"><i data-lucide="compass" style="width:18px;height:18px;display:inline-block;vertical-align:middle;"></i> Start Session</button>
        </div>
      </div>

      <!-- Stats row -->
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
        <div class="stat-card">
          <div class="stat-card-top"><div class="stat-icon green">☀️</div></div>
          <div class="stat-value" id="stat-today"></div>
          <div class="stat-label">Today (min)</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-top"><div class="stat-icon indigo">📅</div></div>
          <div class="stat-value" id="stat-week"></div>
          <div class="stat-label">This Week (hrs)</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-top"><div class="stat-icon amber"><i data-lucide="bar-chart" style="width:18px;height:18px;display:inline-block;vertical-align:middle;"></i></div></div>
          <div class="stat-value" id="stat-avg"></div>
          <div class="stat-label">Avg Session (min)</div>
        </div>
      </div>

      <!-- Sessions table -->
      <div class="section-title"><span>Recent Sessions</span></div>
      <div id="sessions-container"></div>

    </main>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script src="assets/js/intelligence.js"></script>
<script>
(async function () {
  const user = await FS.requireAuth();
  if (!user) return;
  FS.initLayout(user, 'focus');

  let interval = null, elapsed = 0, running = false;
  const display = document.getElementById('timer-display');
  const status  = document.getElementById('timer-status');
  const bar     = document.getElementById('timer-bar');
  const actions = document.getElementById('timer-actions');

  const pad = n => String(n).padStart(2, '0');
  const fmt = s => pad(Math.floor(s/60)) + ':' + pad(s % 60);

  window.startTimer = function () {
    if (running) return;
    running = true; elapsed = 0;
    display.textContent = '00:00';
    status.textContent  = '<i data-lucide="target" style="width:18px;height:18px;display:inline-block;vertical-align:middle;"></i> In the zone stay focused!';
    bar.style.width = '0%';
    actions.innerHTML = `
      <button class="btn btn-success btn-lg" onclick="stopTimer()">✓ Save Session</button>
      <button class="btn btn-ghost btn-lg"   onclick="discardTimer()">✕ Discard</button>`;
    interval = setInterval(() => {
      elapsed++;
      display.textContent = fmt(elapsed);
      bar.style.width = Math.min((elapsed / 1500) * 100, 100) + '%'; // 25-min Pomodoro = 100%
      // Phase labels
      if (elapsed === 300)  status.textContent = '5 min warm-up done. Distractions should fade now.';
      if (elapsed === 900)  status.textContent = '15 min entering flow state territory.';
      if (elapsed === 1500) status.textContent = '🍅 25 min Pomodoro complete! Consider saving or extending.';
      if (elapsed === 2700) status.textContent = '45 min deep work achieved. <i data-lucide="brain" style="width:18px;height:18px;display:inline-block;vertical-align:middle;"></i>';
    }, 1000);
  };

  window.stopTimer = async function () {
    if (!running) return;
    clearInterval(interval); running = false;
    const mins = Math.max(1, Math.round(elapsed / 60));
    status.textContent = '💾 Saving…';
    actions.innerHTML  = '';
    const res = await FS.api('/api/focus/index.php', 'POST', { duration_minutes: mins });
    if (res.ok) {
      const type = mins >= 45 ? '<i data-lucide="brain" style="width:18px;height:18px;display:inline-block;vertical-align:middle;"></i> Deep work' : mins >= 25 ? '🍅 Pomodoro' : '⚡ Quick burst';
      FS.toast(`${type} saved! ${mins} min ${Math.round(mins * 16.67)} calories equivalent focus. <i data-lucide="target" style="width:18px;height:18px;display:inline-block;vertical-align:middle;"></i>`, 'success');
      loadStats();
    } else FS.toast(res.data.error || 'Save failed', 'danger');
    resetTimer();
  };

  window.discardTimer = function () {
    clearInterval(interval); running = false;
    FS.toast('Session discarded.', 'danger');
    resetTimer();
  };

  function resetTimer() {
    elapsed = 0;
    display.textContent = '00:00';
    status.textContent  = 'Ready start a deep work session';
    bar.style.width = '0%';
    actions.innerHTML = `<button class="btn btn-primary btn-lg" onclick="startTimer()"><i data-lucide="compass" style="width:18px;height:18px;display:inline-block;vertical-align:middle;"></i> Start Session</button>`;
  }

  async function loadStats() {
    const res = await FS.api('/api/focus/index.php');
    if (!res.ok) return;
    const d = res.data;

    document.getElementById('stat-today').textContent = d.today_minutes;
    document.getElementById('stat-week').textContent  = d.week_hours;
    document.getElementById('stat-avg').textContent   = d.avg_minutes;

    // Intelligence
    const intel = Intel.focus(d.sessions || [], d);
    if (intel && d.sessions?.length) {
      document.getElementById('prod-card').style.display = 'flex';
      Intel.renderScoreGauge(intel.productivityScore, 'Score', document.getElementById('focus-gauge'));
      document.getElementById('ps-val').textContent = intel.productivityScore + '/100';
      const tier = intel.productivityScore >= 80 ? 'Elite' : intel.productivityScore >= 60 ? 'Strong' : intel.productivityScore >= 40 ? 'Building' : 'Low';
      document.getElementById('ps-sub').textContent  = tier + ' Productivity';
      document.getElementById('pm-avg').textContent  = intel.metrics.avgMins + ' min';
      document.getElementById('pm-deep').textContent = intel.metrics.deepWork + ' deep';
      document.getElementById('pm-week').textContent = intel.metrics.weekHrs + ' hrs';
      const trendEl = document.getElementById('pm-trend');
      trendEl.className = 'val ' + (intel.metrics.trend === 'improving' ? 'trend-up' : intel.metrics.trend === 'declining' ? 'trend-down' : 'trend-flat');
      trendEl.textContent = intel.metrics.trend === 'improving' ? '↑ Up' : intel.metrics.trend === 'declining' ? '↓ Down' : '→ Stable';

      document.getElementById('focus-intel-panel').style.display = 'block';
      const badge = document.getElementById('focus-badge');
      badge.textContent = intel.productivityScore >= 60 ? 'High Performance' : intel.productivityScore >= 40 ? 'On Track' : 'Needs Boost';
      badge.className   = 'intel-badge badge-' + (intel.productivityScore >= 60 ? 'success' : intel.productivityScore >= 40 ? 'warn' : 'danger');
      Intel.renderInsights(intel.insights, document.getElementById('focus-insights'));
    }

    // Sessions table
    const cont = document.getElementById('sessions-container');
    if (!d.sessions?.length) {
      cont.innerHTML = `<div class="empty-state">
        <div class="empty-icon"><i data-lucide="timer" style="width:18px;height:18px;display:inline-block;vertical-align:middle;"></i></div><h3>No sessions yet</h3>
        <p>Start your first focus session above. Even 20 minutes counts.</p>
      </div>`;
      return;
    }
    const tod = { morning:'🌅', afternoon:'☀️', evening:'🌆', night:'🌙' };
    const classify = m => +m >= 90 ? '<i data-lucide="brain" style="width:18px;height:18px;display:inline-block;vertical-align:middle;"></i> Flow State' : +m >= 45 ? '💪 Deep Work' : +m >= 25 ? '🍅 Pomodoro' : '⚡ Burst';
    cont.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Duration</th><th>Session Type</th><th>Time of Day</th></tr></thead>
      <tbody>${d.sessions.map(s => `<tr>
        <td>${FS.relDate(s.session_date)}</td>
        <td><strong>${s.duration_minutes}</strong> min</td>
        <td>${classify(s.duration_minutes)}</td>
        <td>${tod[s.time_of_day]||''} ${s.time_of_day.charAt(0).toUpperCase()+s.time_of_day.slice(1)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }

  await loadStats();
  FS.showLoading(false);
  document.getElementById('fs-app').style.display = 'flex';
})();
</script>
</body>
</html>
