<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HabitSync — Track daily habits and build streaks on FlowStack.">
    <title>HabitSync — FlowStack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

<div id="fs-loading"><div class="fs-spinner"></div></div>

<div class="fs-app" style="display:none" id="fs-app">
    <div id="fs-overlay" class="sidebar-overlay"></div>
    <aside id="fs-sidebar" class="sidebar"></aside>
    <div class="fs-body">
        <header id="fs-header" class="header"></header>
        <main class="main-content">

            <div class="page-header">
                <div>
                    <h1>HabitSync</h1>
                    <p>Track your daily habits and build streaks</p>
                </div>
            </div>

            <!-- Add habit -->
            <div class="card" style="margin-bottom:1.5rem">
                <div class="section-title"><span>Add New Habit</span></div>
                <form id="add-form" novalidate>
                    <div style="display:flex;gap:.75rem;align-items:flex-end">
                        <div class="form-group" style="flex:1;margin-bottom:0">
                            <label for="habit-name">Habit Name</label>
                            <input type="text" id="habit-name" class="form-control"
                                   placeholder="e.g. Read for 20 minutes" maxlength="200" required>
                        </div>
                        <button type="submit" class="btn btn-primary" id="btn-add">+ Add Habit</button>
                    </div>
                </form>
            </div>

            <!-- Habits list -->
            <div class="section-title">
                <span>Your Habits</span>
                <span id="habit-count" class="badge badge-purple"></span>
            </div>
            <div id="habits-container">
                <div class="empty-state">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                    <h3>No habits yet</h3>
                    <p>Start building your first habit to unlock streak tracking.</p>
                </div>
            </div>

        </main>
    </div>
</div>

<script src="assets/js/app.js"></script>
<script>
(async function () {
    const user = await FS.requireAuth();
    if (!user) return;
    FS.initLayout(user, 'habits');

    const container = document.getElementById('habits-container');
    const countEl   = document.getElementById('habit-count');

    async function loadHabits() {
        const res = await FS.api('/api/habits/index.php');
        if (!res.ok) { container.innerHTML = '<p style="color:var(--color-danger)">Failed to load habits.</p>'; return; }
        const habits = res.data.habits || [];
        countEl.textContent = habits.length + ' habit' + (habits.length !== 1 ? 's' : '');

        if (habits.length === 0) {
            container.innerHTML = `<div class="empty-state">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                <h3>No habits yet</h3>
                <p>Start building your first habit to unlock streak tracking.</p>
            </div>`;
            return;
        }

        container.innerHTML = `<div class="habit-list">${habits.map(h => `
            <div class="habit-item" id="habit-${h.id}">
                <button class="habit-check ${h.done_today ? 'done' : ''}"
                        onclick="toggleHabit(${h.id}, ${h.done_today ? 1 : 0})"
                        aria-label="${h.done_today ? 'Completed' : 'Mark complete'}"
                        title="${h.done_today ? '✓ Done today' : 'Mark as done'}">
                    ${h.done_today ? '✓' : ''}
                </button>
                <div class="habit-info">
                    <div class="habit-name">${FS.escape(h.name)}</div>
                    <div class="habit-meta">
                        <span class="streak">🔥 ${h.streak} day streak</span>
                        <span>${h.pct_week}% this week</span>
                        ${h.last_completed ? '<span>Last: ' + FS.relDate(h.last_completed) + '</span>' : ''}
                    </div>
                    <div class="progress-wrap" style="margin-top:.45rem;max-width:200px">
                        <div class="progress-bar" style="width:${h.pct_week}%"></div>
                    </div>
                </div>
                <div class="habit-actions">
                    <button class="btn btn-danger btn-sm" onclick="deleteHabit(${h.id}, '${FS.escape(h.name)}')" aria-label="Delete habit">✕</button>
                </div>
            </div>`).join('')}
        </div>`;
    }

    window.toggleHabit = async function (id, done) {
        if (done) return;
        const res = await FS.api('/api/habits/update.php', 'POST', { habit_id: id });
        if (res.ok) { FS.toast('Habit marked complete! 🎉', 'success'); loadHabits(); }
        else FS.toast(res.data.error || 'Failed', 'danger');
    };

    window.deleteHabit = async function (id, name) {
        if (!confirm('Delete habit "' + name + '"?')) return;
        const res = await FS.api('/api/habits/delete.php', 'POST', { habit_id: id });
        if (res.ok) { FS.toast('Habit deleted', 'success'); loadHabits(); }
        else FS.toast('Failed to delete', 'danger');
    };

    document.getElementById('add-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const name = document.getElementById('habit-name').value.trim();
        if (!name) return;
        const btn = document.getElementById('btn-add');
        btn.disabled = true; btn.textContent = 'Adding…';
        const res = await FS.api('/api/habits/add.php', 'POST', { name });
        if (res.ok) {
            FS.toast('Habit added!', 'success');
            document.getElementById('habit-name').value = '';
            loadHabits();
        } else {
            FS.toast(res.data.error || 'Failed', 'danger');
        }
        btn.disabled = false; btn.textContent = '+ Add Habit';
    });

    await loadHabits();
    FS.showLoading(false);
    document.getElementById('fs-app').style.display = 'flex';
})();
</script>
</body>
</html>
